                name: Uplink
                enabled: true
                type: trunk
                tags:
                  - uplink
                  - trunk
                vlan: 1
                allowed_vlans: 1,103,900-901,965-968
                link_negotiation: Auto negotiate
                udld: Alert only
                storm_control: true
                peer_sgt_capable: true
                rstp: true
              - port_id_ranges:
                - from: 23
                  to: 24
                name: unused
                enabled: false
                type: trunk
                tags:
                  - uplink
                  - trunk
                vlan: 1
                allowed_vlans: 1
                link_negotiation: Auto negotiate
                udld: Alert only
                storm_control: true
                peer_sgt_capable: true
                rstp: true
          # First access point configuration
          #
          # Defines the name, serial number, geolocation coordinates
          # (latitude & longitude), and address variables for the
          # first access point within the site to which the template
          # is applied.
          #   
          - name: ${ap_01_name}
            serial: ${ap_01_serial}
            tags:
              - CW9176I
            lat: ${lat}
            lng: ${lng}
            address: ${address}
            notes: cf wireless
          #
          # The below code does the following:
          #
          # Second access point configuration
          #
          # Defines the name, serial number, geolocation coordinates
          # (latitude & longitude), and address variables for the
          # second access point within the site to which the template
