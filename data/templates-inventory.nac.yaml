          - name: ${access_switch_02_name}
            serial: ${access_switch_02_serial}
            tags:
              - C9300-24
              - leaf101
            lat: ${lat}
            lng: ${lng}
            address: ${address}
            notes: cloud fabric leaf
            switch:
              ports:
              - port_id_ranges:
                - from: 1
                  to: 6
                name: Access Port
                enabled: true
                type: access
                tags:
                  - access
                vlan: 1023
                voice_vlan: 1022
                link_negotiation: Auto negotiate
                storm_control: true
                rstp: true
                stp_guard: bpdu guard
              - port_id_ranges:
                - from: 7
                  to: 21
                name: unused
                enabled: false
                type: access
                tags:
                  - access
                vlan: 999
                voice_vlan: 1
                link_negotiation: Auto negotiate
                storm_control: true
                rstp: true
                stp_guard: bpdu guard
              - port_id_ranges:
                - from: 23
                  to: 23
                name: Uplink
                enabled: true
                type: trunk
                tags:
                  - uplink
                  - trunk
                vlan: 1
                allowed_vlans: 1,103,900-901,965-968
